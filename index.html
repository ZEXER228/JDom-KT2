<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .cats-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
        }

        .cat-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 250px;
            transition: transform 0.2s;
        }

        .cat-card:hover {
            transform: scale(1.05);
        }

        .cat-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .cat-info {
            padding: 15px;
        }

        .cat-info h2 {
            margin: 0 0 10px;
            font-size: 1.2em;
        }

        .cat-info p {
            margin: 5px 0;
            font-size: 0.9em;
            color: #555;
        }

        .favourite {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Наши милые котики 🐱</h1>
    <div class="cats-container" id="catsContainer"></div>

    <script>
        const cats = [
            {"name":"Лара","img_link":"https://www.friendforpet.ru/api/sites/default/files/2021-09/167200DD-A44F-4845-8D4D-ACCFC180165A.jpeg","age":8,"rate":7,"favourite":false,"description":"Лара – шотландская вислоухая, у нее остеохондродисплазия. Лара спокойная, очень ласковая и контактная. Болезнь не лечится и специального ухода не нужно.","id":1},
            {"name":"Базиль","img_link":"https://www.friendforpet.ru/api/sites/default/files/2022-01/064AEBCB-45EC-4CE7-AB13-C65F10F00B7B.jpeg","age":2,"rate":10,"favourite":false,"description":"Внимательный, активный и ласковый. Любит играть, катать мяч, и мурчать на пледе рядом с людьми! Прилично воспитан, приучен к лотку. Вакцинирован, имеет ветеринарный паспорт.","id":2},
            {"name":"Риш","img_link":"https://www.friendforpet.ru/api/sites/default/files/2022-01/_DM34706.JPG","age":1,"rate":10,"favourite":true,"description":"Риш любит лесенки, канаты. Очень активный и дружелюбный кот. Риш полностью здоров, привит, кастрирован. Использует лоточек и очень аккуратен.","id":3},
            {"name":"Элли","img_link":"https://www.friendforpet.ru/api/sites/default/files/2022-01/1_25.jpg","age":4,"rate":8,"favourite":false,"description":"Элли обладает мягким и добрым характером. Очень любит всевозможные лакомства и вкусно покушать. Не доверяет людям, потребуется время, чтобы стать ей другом. Приучена к лотку и когтеточке","id":4},
            {"name":"Чарли","img_link":"https://www.friendforpet.ru/api/sites/default/files/2022-01/%D0%BB%D0%B5%D0%B2%D0%B8%D0%B8%D0%B9%20%D0%B0%D0%BB%D0%B5%D0%BA%D1%81.jpg","age":1,"rate":8,"favourite":false,"description":"Чёрно-белый юный котофилософ очень любит размышлять и быть наедине. Пока что не доверяет людям, не агрессивный. Ладит с другими животными, приучен к лотку и когтеточке","id":5},
            {"name":"Стефани","img_link":"https://www.friendforpet.ru/api/sites/default/files/2022-01/4_30.jpg","age":6,"rate":9,"favourite":false,"description":"Прелестная Стефани – трогательная, добродушная и очень-очень общительная девочка как никто другой нуждается в заботе и любви. Приучена к лотку и когтеточке","id":6},
            {"name":"Дуся","img_link":"https://www.friendforpet.ru/api/sites/default/files/2022-02/B1444207-6EE3-4BA4-97F7-2F9666AE2F63.jpeg","age":1,"rate":9,"favourite":false,"description":"Дусеньке около 1 года с небольшим, здорова, привита, стерилизована. Лоточек и когтеточку знает прекрасно. Очень общительная и нежная, хочет постоянного внимания.","id":7},
            {"name":"Бруно","img_link":"https://www.friendforpet.ru/api/sites/default/files/2022-01/IMG-20211223-WA0049.jpg","age":1,"rate":10,"favourite":false,"description":"Очаровательный активный кот Бруно, находится в постоянном движении! Очаровательный и ласковый кот. Приучен к лотку, ладит с другими котами, привит.","id":8},
            {"name":"Лара","img_link":"https://www.friendforpet.ru/api/sites/default/files/2022-01/%D1%81%D0%B2%D0%B5%D1%82%D0%BB%D1%8F%D1%87%D0%BE%D0%BA4_%D0%B0%D0%BB%D0%B5%D0%BA%D1%81.jpg","age":1,"rate":9,"favourite":true,"description":"Немного боязливый, но очень добрый и нежный кот Светлячок. Приучен к лотку и когтеточке, ладит с детьми, привит. Станет вам хорошим другом","id":9}
        ];

        const container = document.getElementById('catsContainer');

        cats.forEach(cat => {
            const card = document.createElement('div');
            card.classList.add('cat-card');

            card.innerHTML = `
                <img src="${cat.img_link}" alt="${cat.name}">
                <div class="cat-info">
                    <h2>${cat.name} ${cat.favourite ? '<span class="favourite">★</span>' : ''}</h2>
                    <p><strong>Возраст:</strong> ${cat.age} лет</p>
                    <p><strong>Рейтинг:</strong> ${cat.rate}/10</p>
                    <p>${cat.description}</p>
                </div>
            `;

            container.appendChild(card);
        });
    </script>
</body>
</html>
